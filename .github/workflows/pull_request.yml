name: Badge Magic PR CI

on:
  pull_request:
    branches: [ "development" ]

env:
  ANDROID_EMULATOR_API: 34
  ANDROID_EMULATOR_ARCH: x86_64
  IPHONE_DEVICE_MODEL: iPhone 16
  IPAD_DEVICE_MODEL: iPad (10th generation)

jobs:
  common:
    name: Common Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Common Workflow
        uses: ./.github/actions/common

      - name: Save PR number
        run: |
          mkdir -p ./pr
          echo ${{ github.event.number }} > ./pr/NR

      - uses: actions/upload-artifact@v4
        with:
          name: pr
          path: pr/

  android:
    name: Android Flutter Build
    needs: common
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Android Workflow
        uses: ./.github/actions/android

  ios:
    name: iOS Flutter Build
    needs: common
    runs-on: macos-latest
    steps:
      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1.6.0
        with:
          xcode-version: latest-stable

      - uses: actions/checkout@v4

      - name: iOS Workflow
        uses: ./.github/actions/ios

  screenshots-android:
    name: Screenshots (Android)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Android Screenshot Workflow
        uses: ./.github/actions/screenshot-android
        with:
          ANDROID_EMULATOR_API: ${{ env.ANDROID_EMULATOR_API }}
          ANDROID_EMULATOR_ARCH: ${{ env.ANDROID_EMULATOR_ARCH }}

  screenshots-ios:
    name: Screenshots (iOS)
    runs-on: macos-latest
    steps:
      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1.6.0
        with:
          xcode-version: latest-stable

      - uses: actions/checkout@v4

      - name: List available simulators
        run: xcrun simctl list devices

      - name: iOS Screenshot Workflow
        uses: ./.github/actions/screenshot-ios
        with:
          IPHONE_DEVICE_MODEL: ${{ env.IPHONE_DEVICE_MODEL }}
          IPAD_DEVICE_MODEL: ${{ env.IPAD_DEVICE_MODEL }}

  macos:
    name: Build MacOS App
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.0
      - run: flutter pub get
      - run: flutter build macos --release
      - uses: actions/upload-artifact@v4
        with:
          name: macos-app
          path: build/macos/Build/Products/Release/*.app
  
  windows:
    name: Build Windows EXE
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.0
      - run: flutter pub get
      - run: flutter build windows --release
      - uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: build/windows/x64/runner/Release/*.exe
    
  debian:
    name: Build Debian Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.24.0
      - run: flutter pub get
      - run: flutter build linux --release
      - name: Install fpm
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby-dev build-essential
          sudo gem install --no-document fpm
      - run: |
          mkdir -p debian-out
          fpm -s dir -t deb \
            -n badgemagic \
            -v 1.0.0 \
            build/linux/x64/release/bundle/=/
      - uses: actions/upload-artifact@v4
        with:
          name: debian-package
          path: "*.deb"


      