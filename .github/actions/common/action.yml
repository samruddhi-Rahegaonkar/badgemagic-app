name: "Common Workflow"

runs:
  using: "composite"
  steps:
    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        cache: true
        flutter-version-file: pubspec.yaml

    - name: Fetch Flutter Dependencies
      shell: bash
      run: flutter pub get

    - name: Validate Code Format
      shell: bash
      run: |
        # Format all files except generated ones
        find . -name "*.dart" \
          -not -path "*/lib/l10n/*.dart" \
          -not -path "*/generated/*" \
          -not -path "*/build/*" | xargs dart format --output=none --set-exit-if-changed

    - name: Analyze Code
      shell: bash
      run: flutter analyze --no-fatal-infos

    - name: Run tests
      shell: bash
      run: flutter test
